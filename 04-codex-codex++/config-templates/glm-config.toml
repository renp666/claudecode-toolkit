# ============================================================
# Codex CLI 配置模板 — 智谱 GLM-4
# 适用：Codex CLI v0.130+
# 说明：GLM-4-Flash 提供免费额度，适合低成本场景
# 前提：已设置 ZHIPU_API_KEY 环境变量
# ============================================================

# --- 默认模型 ---
model = "glm-4-flash"
model_provider = "glm"

# --- 模型供应商定义 ---
[model_providers.glm]
name = "Zhipu GLM"
base_url = "https://open.bigmodel.cn/api/paas/v4"
wire_api = "responses"
env_key = "ZHIPU_API_KEY"
requires_openai_auth = false

# --- 模型能力声明 ---
[model_properties."glm-4-plus"]
context_window = 131072
max_context_window = 131072
supports_parallel_tool_calls = true
supports_reasoning_summaries = false
input_modalities = ["text"]

[model_properties."glm-4-flash"]
context_window = 131072
max_context_window = 131072
supports_parallel_tool_calls = true
supports_reasoning_summaries = false
input_modalities = ["text"]

[model_properties."glm-4-air"]
context_window = 131072
max_context_window = 131072
supports_parallel_tool_calls = false
supports_reasoning_summaries = false
input_modalities = ["text"]

# --- 多场景 Profiles ---
[profiles.glm-free]
model = "glm-4-flash"
model_provider = "glm"

[profiles.glm-pro]
model = "glm-4-plus"
model_provider = "glm"
model_reasoning_effort = "high"

# --- 安全设置 ---
approval_mode = "default"
sandbox_mode = "workspace_write"
