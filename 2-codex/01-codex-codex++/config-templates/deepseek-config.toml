# ============================================================
# Codex CLI 配置模板 — DeepSeek V4（推荐首选）
# 适用：Codex CLI v0.130+
# 说明：直接复制到 ~/.codex/config.toml 或合并到现有配置
# ============================================================

# --- 默认模型 ---
model = "deepseek-v4-pro"
model_provider = "deepseek"

# --- 模型供应商定义 ---
[model_providers.deepseek]
name = "DeepSeek"
base_url = "https://api.deepseek.com/v1"
wire_api = "responses"
env_key = "DEEPSEEK_API_KEY"
requires_openai_auth = false

# --- 模型能力声明（消除 "Model metadata not found" 警告）---
[model_properties."deepseek-v4-pro"]
context_window = 262144
max_context_window = 262144
supports_parallel_tool_calls = true
supports_reasoning_summaries = false
input_modalities = ["text"]

[model_properties."deepseek-v4-flash"]
context_window = 262144
max_context_window = 262144
supports_parallel_tool_calls = true
supports_reasoning_summaries = false
input_modalities = ["text"]

# --- 多场景 Profiles ---
[profiles.deepseek-pro]
model = "deepseek-v4-pro"
model_provider = "deepseek"
model_reasoning_effort = "xhigh"

[profiles.deepseek-flash]
model = "deepseek-v4-flash"
model_provider = "deepseek"
model_reasoning_effort = "medium"

# --- 安全设置 ---
approval_mode = "default"  # default | auto_edit | yolo
sandbox_mode = "workspace_write"
